<template>
    <lightning-card title="Payment Confirmation" icon-name="utility:success">
        <div class="slds-p-around_medium slds-text-align_center">
            <lightning-icon icon-name="utility:success" variant="success" size="large"></lightning-icon>
            <h2 class="slds-text-heading_medium slds-m-top_small">Thank you for your payment</h2>
            <p class="slds-m-top_x-small slds-text-color_weak">
                Your payment is being processed. You will receive a receipt by email shortly.
            </p>
            <template if:true={hasReference}>
                <p class="slds-text-body_small slds-m-top_small">Reference: {sessionId}{paymentIntent}</p>
            </template>
        </div>
    </lightning-card>
</template>
